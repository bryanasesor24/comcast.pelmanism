<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessMatch | Premium Memory Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    
    <header class="top-header">
        <div class="logo">PROCESS<span>MATCH</span></div>
        <div class="stats">
            <div class="stat-item">TIME: <span id="timer">00:00</span></div>
            <div class="stat-item">PAIRS LEFT: <span id="pairs-count">0</span></div>
        </div>
        <div class="actions">
            <button id="restart-btn" class="btn-secondary">Restart</button>
        </div>
    </header>

    <main class="game-container">
        <!-- Left Panel: Process List -->
        <aside class="side-panel left-panel">
            <h3>Business Processes</h3>
            <div id="process-list" class="process-scroll-area">
                <!-- Injected via JS -->
            </div>
        </aside>

        <!-- Center Panel: Grid -->
        <section class="main-stage">
            <div id="game-grid" class="grid-container">
                <!-- Cards Injected via JS -->
            </div>
        </section>

        <!-- Right Panel: Leaderboard -->
        <aside class="side-panel right-panel">
            <h3>Leaderboard</h3>
            <div class="leaderboard-list">
                <div class="leader-item">
                    <span class="rank">#1</span>
                    <span class="name">Alex Chen</span>
                    <span class="time">00:42</span>
                </div>
                <div class="leader-item">
                    <span class="rank">#2</span>
                    <span class="name">Sarah Smith</span>
                    <span class="time">00:55</span>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
